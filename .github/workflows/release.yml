name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Extract version from manifest
        id: manifest
        run: |
          VERSION=$(grep '^version =' blender_manifest.toml | cut -d '"' -f 2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Package addon
        run: |
          mkdir -p build/umayuru
          cp __init__.py build/umayuru/
          cp blender_manifest.toml build/umayuru/
          cp -r addons build/umayuru/
          cp -r common build/umayuru/
          cp LICENSE build/umayuru/ 2>/dev/null || true
          cd build
          zip -r ../umayuru-${{ steps.manifest.outputs.version }}.zip umayuru/
          cd ..
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: addon-package
          path: umayuru-*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: addon-package
          path: ./
      
      - name: Extract version from manifest
        id: manifest
        run: |
          VERSION=$(grep '^version =' blender_manifest.toml | cut -d '"' -f 2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Prepare release notes
        run: |
          if [ -f "CHANGELOG.md" ]; then
            cp CHANGELOG.md RELEASE_NOTES.md
          else
            printf '## 🚀 Version %s\n' "${{ steps.manifest.outputs.version }}" > RELEASE_NOTES.md
          fi
      
      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${{ steps.manifest.outputs.version }}"
          ZIP_FILE="umayuru-${VERSION}.zip"
          
          gh release create "$TAG" \
            --title "Umayuru $VERSION" \
            --notes-file RELEASE_NOTES.md \
            "$ZIP_FILE"